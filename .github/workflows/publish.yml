name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # OIDC token for npm Trusted Publisher
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24      # npm 11+ required for Trusted Publisher OIDC
          registry-url: 'https://registry.npmjs.org'

      - name: Check versions
        run: node -v && npm -v

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        # --provenance and --access public come from package.json publishConfig
